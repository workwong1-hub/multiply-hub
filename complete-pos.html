<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gather & Give 完整 POS</title><style>
*{box-sizing:border-box}body{margin:0;background:#f8fafc;color:#0f172a;font:14px Arial,"Microsoft YaHei",sans-serif}button,select{font:inherit;cursor:pointer}.top{height:66px;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 28px}.top b{font-size:18px}.top span{color:#bfdbfe}.app{display:grid;grid-template-columns:1fr 360px;gap:18px;padding:22px;max-width:1400px;margin:auto}.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px}.head{display:flex;justify-content:space-between;align-items:center;gap:12px}.filters{display:flex;gap:7px;flex-wrap:wrap;margin:16px 0}.filter{border:1px solid #cbd5e1;background:#fff;padding:8px 11px;border-radius:8px}.filter.on{background:#2563eb;color:#fff;border-color:#2563eb}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}.product{background:#fff;border:1px solid #e2e8f0;border-radius:11px;text-align:left;padding:14px;min-height:112px}.product:hover{border-color:#2563eb;box-shadow:0 2px 8px #2563eb18}.product .type{color:#64748b;font-size:12px}.product b{display:block;font-size:15px;margin:7px 0}.product strong{color:#2563eb}.stock{color:#64748b;font-size:12px}.line{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0;padding:12px 0}.line small{color:#64748b}.qty{display:flex;gap:8px;align-items:center}.qty button{height:25px;width:25px;border:0;border-radius:6px;background:#eff6ff;color:#2563eb;font-size:18px}.total{display:flex;justify-content:space-between;padding:16px 0;font-size:20px;font-weight:800}.pay{width:100%;padding:12px;border-radius:9px;background:#2563eb;color:#fff;border:0;font-weight:700}.pay:disabled{background:#94a3b8}select{width:100%;padding:9px;border:1px solid #cbd5e1;border-radius:8px;margin:6px 0 12px}.tabs{max-width:1400px;margin:20px auto 0;padding:0 22px;display:flex;gap:8px}.tab{border:1px solid #cbd5e1;background:#fff;padding:9px 12px;border-radius:8px}.tab.on{color:#fff;background:#2563eb;border-color:#2563eb}.panel{display:none;max-width:1356px;margin:0 auto 25px;padding:0 22px}.panel.on{display:block}table{width:100%;border-collapse:collapse}th,td{padding:11px;text-align:left;border-bottom:1px solid #e2e8f0}th{font-size:11px;color:#64748b;text-transform:uppercase;background:#f8fafc}.low{background:#fef3c7;color:#92400e;padding:4px 7px;border-radius:12px;font-size:12px}.ok{background:#dcfce7;color:#166534;padding:4px 7px;border-radius:12px;font-size:12px}.notice{display:none;position:fixed;bottom:20px;right:20px;background:#0f172a;color:#fff;padding:13px 16px;border-radius:8px}@media(max-width:850px){.app{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:450px){.app{padding:12px}.grid{grid-template-columns:1fr}.top{padding:0 15px}.top span{display:none}}
</style></head><body><header class="top"><b>♥ Gather & Give｜完整销售 POS</b><span>本地试用资料自动保存在浏览器</span></header><div class="tabs"><button class="tab on" onclick="tab('sales',this)">销售 POS</button><button class="tab" onclick="tab('orders',this)">订单记录</button><button class="tab" onclick="tab('stock',this)">库存状况</button></div><section class="panel on" id="sales"><main class="app"><div class="card"><div class="head"><div><b style="font-size:19px">商品目录</b><br><span class="stock">选择商品加入订单</span></div><button class="filter" onclick="clearCart()">清空订单</button></div><div class="filters" id="filters"></div><div class="grid" id="products"></div></div><aside class="card"><b style="font-size:18px">订单摘要</b><div id="cart"></div><div class="total"><span>总额</span><span id="total">RM 0.00</span></div><label class="stock">付款方式</label><select id="method"><option>现金</option><option>DuitNow QR</option><option>银行转账</option><option>Touch n Go</option></select><button class="pay" id="checkout" onclick="checkout()">完成收款</button></aside></main></section><section class="panel" id="orders"><div class="card"><h2>订单记录</h2><table><thead><tr><th>订单编号</th><th>日期</th><th>商品</th><th>金额</th><th>付款方式</th></tr></thead><tbody id="orderRows"></tbody></table></div></section><section class="panel" id="stock"><div class="card"><h2>库存状况</h2><table><thead><tr><th>SKU</th><th>商品</th><th>分类</th><th>现有库存</th><th>最低库存</th><th>状态</th></tr></thead><tbody id="stockRows"></tbody></table></div></section><div class="notice" id="notice"></div><script>
const storage='fms-complete-pos-v1';const base=[['COF-AME','美式咖啡','咖啡',6,40,10],['COF-LAT','冰拿铁','咖啡',8,40,10],['COF-CAP','卡布奇诺','咖啡',8,30,10],['COF-MOC','摩卡咖啡','咖啡',9,25,8],['CAKE-CHO','巧克力蛋糕','蛋糕',7,18,8],['CAKE-CHE','芝士蛋糕','蛋糕',8,16,8],['CAKE-CAR','胡萝卜蛋糕','蛋糕',7,14,6],['SHIRT-1','团契衣服（尺码 1）','衣服',35,20,5],['SHIRT-2','团契衣服（尺码 2）','衣服',35,20,5],['SHIRT-3','团契衣服（尺码 3）','衣服',35,20,5],['SHIRT-4','团契衣服（尺码 4）','衣服',35,20,5],['TOTE-01','团契帆布袋','帆布袋',18,30,10],['BRICK-01','爱心砖块','砖块',100,999,0]].map(([sku,name,category,price,stock,min])=>({sku,name,category,price,stock,min}));let data=JSON.parse(localStorage.getItem(storage)||'null')||{items:base,orders:[]},cart=[],category='全部';const money=n=>'RM '+n.toFixed(2);function persist(){localStorage.setItem(storage,JSON.stringify(data))}function note(s){let n=document.querySelector('#notice');n.textContent=s;n.style.display='block';setTimeout(()=>n.style.display='none',2200)}function render(){let cats=['全部',...new Set(data.items.map(x=>x.category))];document.querySelector('#filters').innerHTML=cats.map(x=>`<button class="filter ${x===category?'on':''}" onclick="category='${x}';render()">${x}</button>`).join('');let list=data.items.filter(x=>category==='全部'||x.category===category);document.querySelector('#products').innerHTML=list.map(x=>`<button class="product" onclick="add('${x.sku}')"><span class="type">${x.category}</span><b>${x.name}</b><strong>${money(x.price)}</strong><br><span class="stock">库存：${x.stock}</span></button>`).join('');document.querySelector('#cart').innerHTML=cart.length?cart.map(x=>`<div class="line"><span><b>${x.name}</b><br><small>${money(x.price)} × ${x.qty}</small></span><span class="qty"><button onclick="qty('${x.sku}',-1)">−</button>${x.qty}<button onclick="qty('${x.sku}',1)">＋</button></span></div>`).join(''):'<p class="stock" style="text-align:center;padding:25px">尚未加入商品</p>';let total=cart.reduce((a,x)=>a+x.price*x.qty,0);document.querySelector('#total').textContent=money(total);document.querySelector('#checkout').disabled=!cart.length;document.querySelector('#orderRows').innerHTML=data.orders.length?[...data.orders].reverse().map(o=>`<tr><td>${o.id}</td><td>${o.date}</td><td>${o.items.map(x=>x.name+' × '+x.qty).join('、')}</td><td>${money(o.total)}</td><td>${o.method}</td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#64748b">暂无订单</td></tr>';document.querySelector('#stockRows').innerHTML=data.items.map(x=>`<tr><td>${x.sku}</td><td><b>${x.name}</b></td><td>${x.category}</td><td>${x.stock}</td><td>${x.min}</td><td><span class="${x.stock<=x.min?'low':'ok'}">${x.stock<=x.min?'库存偏低':'正常'}</span></td></tr>`).join('')}function add(sku){let item=data.items.find(x=>x.sku===sku),line=cart.find(x=>x.sku===sku);if(item.stock<1)return note('该商品库存不足');if(line){if(line.qty>=item.stock)return note('库存不足');line.qty++}else cart.push({...item,qty:1});render()}function qty(s,n){let x=cart.find(x=>x.sku===s),stock=data.items.find(x=>x.sku===s).stock;if(n>0&&x.qty>=stock)return note('库存不足');x.qty+=n;if(x.qty<1)cart=cart.filter(x=>x.sku!==s);render()}function clearCart(){cart=[];render()}function checkout(){if(!cart.length)return;for(const line of cart)data.items.find(x=>x.sku===line.sku).stock-=line.qty;let total=cart.reduce((a,x)=>a+x.price*x.qty,0);let id='CAFE-'+String(data.orders.length+1).padStart(6,'0');data.orders.push({id,date:new Date().toLocaleString('zh-CN'),items:cart,total,method:document.querySelector('#method').value});cart=[];persist();render();note(id+' 已收款：'+money(total))}function tab(id,b){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));document.querySelector('#'+id).classList.add('on');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');render()}render();
</script></body></html>
